name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -coverprofile=cover.out ./...
      - run: |
          go tool cover -func=cover.out | tee coverage.txt
          awk -v min=50 '$1=="total:" { gsub("%","",$3); if ($3+0 < min) exit 1 }' coverage.txt
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build-smoke-binary:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build static Linux smoke binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist-smoke
          go build -trimpath -o dist-smoke/beav ./cmd/beav
      - uses: actions/upload-artifact@v4
        with:
          name: beav-linux-amd64-smoke
          path: dist-smoke/beav
          if-no-files-found: error

  cross-distro:
    needs: build-smoke-binary
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu:24.04
          - debian:12-slim
          - fedora:latest
          - archlinux:latest
          - opensuse/tumbleweed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: beav-linux-amd64-smoke
          path: dist-smoke
      - name: Smoke test on ${{ matrix.image }}
        run: |
          chmod +x dist-smoke/beav
          docker run --rm \
            -v "$PWD/dist-smoke/beav:/beav:ro" \
            "${{ matrix.image }}" \
            sh -euxc '/beav version && /beav clean --system --dry-run --output json'
